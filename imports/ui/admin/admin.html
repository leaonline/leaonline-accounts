<template name="admin">
    {{#unless currentUser}}
        {{> login }}
    {{else}}
        {{#with error}}
            <div class="alert alert-danger">
                <div class="alert-heading">{{i18n this.error}}</div>
                {{i18n this.reason}}
            </div>
        {{/with}}

        {{! create and edit form }}
        {{#with userForm}}
            {{> quickForm id="userForm"
                    schema=userSchema
                    type="normal"
                    doc=this.doc
                    buttonClasses="d-none"}}
            <div class="d-flex justify-content-between">
                <button type="submit" form="userForm" class="btn btn-primary">
                    {{i18n "actions.submit"}}
                </button>
                <button class="btn btn-outline-secondary user-btn"
                        data-type="cancel">
                    {{i18n "actions.cancel"}}
                </button>
            </div>
        {{else}}
        {{! list users }}
            <table class="table table-borderless table-striped table-hover">
                <thead>
                <tr>
                <th>{{i18n "user.lastName"}}</th>
                <th>{{i18n "user.firstName"}}</th>
                <th>{{i18n "user.institution"}}</th>
                <th>{{i18n "user.email"}}</th>
                <th class="text-center">{{i18n "user.verified"}}</th>
                <th>{{i18n "user.roles"}}</th>
                <th class="text-end">
                    <button class="btn btn-sm btn-success user-btn"
                            data-type="create">
                        <i class="fas fa-fw fa-plus"></i>
                        <i class="fas fa-fw fa-user"></i>
                    </button>
                </th>
                </tr>
                </thead>
                <tbody>
                {{#each user in users}}
                    <tr>
                        <td>{{user.lastName}}</td>
                        <td>{{user.firstName}}</td>
                        <td>{{user.institution}}</td>
                        <td>{{user.email}}</td>
                        <td class="text-center">
                            {{#if user.verified}}
                                <i class="fas fa-fw fa-check"></i>
                            {{/if}}
                        </td>
                        <td>{{user.roles}}</td>
                        <td class="text-end no-wrap">
                            <button class="btn btn-sm btn-outline-secondary border-0 user-btn"
                                    data-user="{{user._id}}"
                                    data-type="update">
                                <i class="fas fa-fw fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger border-0 user-btn"
                                    data-user="{{user._id}}"
                                    data-type="remove">
                                <i class="fas fa-fw fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                {{else if usersLoading}}
                    <tr><td colspan="7">{{> loading}}</td></tr>
                {{else}}
                    <tr><td colspan="7">{{i18n "common.noEntries"}}</td></tr>
                {{/each}}
                </tbody>
            </table>
        {{/with}}
    {{/unless}}
</template>
